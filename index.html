    function initInteractions() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                this.color = `hsla(${260 + Math.random() * 40}, 70%, 60%, ${Math.random() * 0.5 + 0.2})`;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;
                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) { this.x -= (this.x - this.baseX) / 20; }
                    if (this.y !== this.baseY) { this.y -= (this.y - this.baseY) / 20; }
                }
            }
        }

        function initParticles() {
            particles = [];
            const num = (canvas.width * canvas.height) / 12000;
            for (let i = 0; i < num; i++) particles.push(new Particle());
        }

        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.strokeStyle = `rgba(139, 92, 246, ${0.15 - dist / 800})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.draw(); p.update(); });
            connectParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = undefined; mouse.y = undefined; });
        initParticles();
        animate();
        window.addEventListener('resize', initParticles);

        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        const interactive = document.querySelectorAll('a, button, .btn, .skill-tag, .project-card, .stat-card, .experience-card, .cert-tag');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });
        interactive.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        const sections = document.querySelectorAll('section');
        const navLinks = document.querySelectorAll('.nav-links a');
        window.addEventListener('scroll', () => {
            let current = '';
            sections.forEach(s => { if (scrollY >= s.offsetTop - 200) current = s.getAttribute('id'); });
            navLinks.forEach(l => {
                l.classList.remove('active');
                if (l.getAttribute('href').slice(1) === current) l.classList.add('active');
            });
            document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 50);
        });

        function reveal() {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active');
            });
        }
        window.addEventListener('scroll', reveal);
        reveal();

        document.querySelectorAll('.magnetic').forEach(el => {
            el.addEventListener('mousemove', e => {
                const rect = el.getBoundingClientRect();
                el.style.transform = `translate(${(e.clientX - rect.left - rect.width/2) * 0.2}px, ${(e.clientY - rect.top - rect.height/2) * 0.2}px)`;
            });
            el.addEventListener('mouseleave', () => el.style.transform = 'translate(0, 0)');
        });

        document.addEventListener('mousemove', e => {
            const spheres = document.querySelectorAll('.gradient-sphere');
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            spheres.forEach((s, i) => s.style.transform = `translate(${x * (i + 1) * 20}px, ${y * (i + 1) * 20}px)`);
        });

        document.querySelectorAll('a[href^="#"]').forEach(a => {
            a.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.querySelector('.nav-links').classList.remove('active');
            });
        });
    }

    function scrollToSection(id) {

    }

    </script>

        body { font-family: 'Sora', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.7; overflow-x: hidden; }

        .cursor { width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.15s ease; transform: translate(-50%, -50%); }
        .cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        .cursor.hover { transform: translate(-50%, -50%) scale(2); background: rgba(139, 92, 246, 0.1); border-color: var(--accent-cyan); }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .gradient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .gradient-sphere { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5; animation: morphFloat 20s ease-in-out infinite; transition: transform 0.3s ease; }
        .sphere-1 { width: 800px; height: 800px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); top: -300px; right: -200px; }
        .sphere-2 { width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%); bottom: -200px; left: -200px; animation-delay: -5s; }
        .sphere-3 { width: 500px; height: 500px; background: radial-gradient(circle, var(--accent-pink) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; opacity: 0.3; }
        @keyframes morphFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 25% { transform: translate(50px, -50px) scale(1.1); } 50% { transform: translate(-30px, 30px) scale(0.95); } 75% { transform: translate(40px, 20px) scale(1.05); } }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px); background-size: 60px 60px; z-index: -1; pointer-events: none; }

        nav { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 3rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: rgba(5, 5, 7, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); transition: all 0.3s ease; }
        nav.scrolled { padding: 0.75rem 3rem; background: rgba(5, 5, 7, 0.9); }
        .logo { font-family: 'Instrument Serif', serif; font-size: 1.75rem; background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 0.5rem; list-style: none; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; padding: 0.625rem 1.25rem; border-radius: 100px; transition: all 0.3s ease; position: relative; }
        .nav-links a::before { content: ''; position: absolute; inset: 0; background: var(--gradient-1); opacity: 0; transition: opacity 0.3s ease; border-radius: 100px; }
        .nav-links a span { position: relative; z-index: 1; }
        .nav-links a:hover { color: var(--text-primary); }
        .nav-links a:hover::before { opacity: 0.15; }
        .nav-links a.active { color: var(--text-primary); background: var(--accent-soft); box-shadow: 0 0 20px var(--accent-glow); }
        .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 10px; }
        .menu-toggle span { width: 25px; height: 2px; background: var(--text-primary); }

        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 8rem 3rem 4rem; position: relative; }
        .hero-content { max-width: 1000px; text-align: center; }
        .hero-badge { display: inline-flex; align-items: center; gap: 0.75rem; padding: 0.625rem 1.5rem; background: var(--glass); border: 1px solid var(--border); border-radius: 100px; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-cyan); margin-bottom: 2.5rem; animation: fadeInDown 0.8s ease forwards; opacity: 0; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(6, 182, 212, 0.2); }
        .hero-badge::before { content: ''; width: 8px; height: 8px; background: var(--accent-cyan); border-radius: 50%; animation: pulse 2s ease infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
        .hero h1 { font-family: 'Instrument Serif', serif; font-size: clamp(3rem, 8vw, 6rem); font-weight: 400; line-height: 1.1; margin-bottom: 2rem; animation: fadeInUp 0.8s ease 0.2s forwards; opacity: 0; }
        .hero h1 .line { display: block; }
        .hero h1 .highlight { font-style: italic; background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-description { font-size: 1.2rem; color: var(--text-secondary); max-width: 700px; margin: 0 auto 3rem; animation: fadeInUp 0.8s ease 0.4s forwards; opacity: 0; }
        .hero-cta { display: flex; gap: 1.25rem; justify-content: center; flex-wrap: wrap; animation: fadeInUp 0.8s ease 0.6s forwards; opacity: 0; }
        .btn { display: inline-flex; align-items: center; gap: 0.625rem; padding: 1rem 2rem; border-radius: 100px; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border: none; }
        .btn-primary { background: var(--gradient-1); color: white; box-shadow: 0 4px 30px var(--accent-glow); }
        .btn-primary:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 8px 40px var(--accent-glow), 0 0 60px var(--accent-glow); }
        .btn-secondary { background: var(--glass); color: var(--text-primary); border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .btn-secondary:hover { background: var(--accent-soft); border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 0 30px var(--accent-glow); }
        .scroll-indicator { position: absolute; bottom: 3rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.1em; animation: fadeInUp 0.8s ease 1s forwards, bounce 2s ease infinite 2s; opacity: 0; }
        .scroll-indicator .mouse { width: 24px; height: 36px; border: 2px solid var(--text-muted); border-radius: 12px; position: relative; }
        .scroll-indicator .mouse::before { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 3px; height: 8px; background: var(--accent); border-radius: 3px; animation: scrollWheel 2s ease infinite; }
        @keyframes scrollWheel { 0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; } 50% { transform: translateX(-50%) translateY(8px); opacity: 0; } }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-10px); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }

        section { padding: 8rem 3rem; max-width: 1400px; margin: 0 auto; }
        .section-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 4rem; }
        .section-number { font-family: 'Instrument Serif', serif; font-size: 1.125rem; color: var(--accent-cyan); font-style: italic; text-shadow: 0 0 20px var(--cyan-glow); }
        .section-title { font-family: 'Instrument Serif', serif; font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 400; background: var(--gradient-2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border) 0%, transparent 100%); }

        .about-content { display: grid; gap: 3rem; }
        .about-text { max-width: 900px; }
        .about-text h3 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; margin-bottom: 1.5rem; line-height: 1.3; }
        .about-text h3 .glow-text { color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); }
        .about-text p { color: var(--text-secondary); margin-bottom: 1.25rem; font-size: 1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-top: 3rem; }
        .stat-card { padding: 2rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); }
        .stat-card:hover { border-color: var(--accent); transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2), 0 0 60px rgba(139, 92, 246, 0.1); }
        .stat-value { font-family: 'Instrument Serif', serif; font-size: 2.5rem; font-style: italic; background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.5rem; }

        .experience-timeline { position: relative; padding-left: 3rem; }
        .experience-timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--accent) 0%, var(--accent-cyan) 50%, var(--accent-pink) 100%); box-shadow: 0 0 20px var(--accent-glow); }
        .experience-card { position: relative; padding: 2.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 2rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); }
        .experience-card::before { content: ''; position: absolute; left: -3rem; top: 2.5rem; width: 16px; height: 16px; background: var(--bg-primary); border: 3px solid var(--accent); border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 20px var(--accent-glow); transition: all 0.3s ease; }
        .experience-card:hover { border-color: var(--accent); transform: translateX(12px); box-shadow: 0 20px 40px rgba(139, 92, 246, 0.15); }
        .experience-card:hover::before { background: var(--accent); transform: translateX(-50%) scale(1.3); }
        .experience-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .experience-role { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; }
        .experience-company { color: var(--accent-cyan); font-weight: 500; text-shadow: 0 0 20px var(--cyan-glow); }
        .experience-date { font-size: 0.875rem; color: var(--accent); padding: 0.5rem 1rem; background: var(--accent-soft); border-radius: 100px; border: 1px solid rgba(139, 92, 246, 0.3); }
        .experience-description { color: var(--text-secondary); list-style: none; font-size: 0.95rem; }
        .experience-description li { margin-bottom: 0.75rem; padding-left: 1.5rem; position: relative; transition: all 0.3s ease; }
        .experience-description li::before { content: '→'; position: absolute; left: 0; color: var(--accent); }
        .experience-description li:hover { color: var(--text-primary); transform: translateX(8px); }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 2rem; }
        .project-card { padding: 2.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; backdrop-filter: blur(10px); }
        .project-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gradient-3); transform: scaleX(0); transition: transform 0.4s ease; }
        .project-card:hover { border-color: var(--accent); transform: translateY(-12px) scale(1.01); box-shadow: 0 30px 60px rgba(139, 92, 246, 0.2), 0 0 80px rgba(139, 92, 246, 0.1); }
        .project-card:hover::before { transform: scaleX(1); }
        .project-icon { width: 64px; height: 64px; background: var(--accent-soft); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 1.75rem; border: 1px solid rgba(139, 92, 246, 0.3); box-shadow: 0 0 30px rgba(139, 92, 246, 0.2); transition: all 0.3s ease; }
        .project-card:hover .project-icon { transform: scale(1.1) rotate(5deg); box-shadow: 0 0 40px var(--accent-glow); }
        .project-title { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 1rem; }
        .project-description { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.75rem; line-height: 1.7; }
        .project-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .project-tag { font-size: 0.7rem; padding: 0.4rem 0.8rem; background: var(--glass); border: 1px solid var(--border); border-radius: 100px; color: var(--text-muted); transition: all 0.3s ease; }
        .project-tag:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }

        .education-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; }
        .education-card { padding: 2.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); }
        .education-card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 20px 40px rgba(139, 92, 246, 0.15); }
        .education-degree { font-family: 'Instrument Serif', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 0.75rem; }
        .education-school { color: var(--accent-cyan); margin-bottom: 0.5rem; text-shadow: 0 0 20px var(--cyan-glow); }
        .education-meta { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.85rem; color: var(--text-muted); }

        .skills-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .skills-category { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .skills-category:hover { border-color: rgba(139, 92, 246, 0.3); }
        .skills-category h3 { font-family: 'Instrument Serif', serif; font-size: 1.25rem; font-weight: 400; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        .skills-category h3::before { content: ''; width: 4px; height: 24px; background: var(--gradient-1); border-radius: 2px; }
        .skills-list { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .skill-tag { padding: 0.6rem 1rem; background: var(--glass); border: 1px solid var(--border); border-radius: 100px; font-size: 0.8rem; color: var(--text-secondary); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: default; }
        .skill-tag:hover { border-color: var(--accent); color: var(--text-primary); background: var(--accent-soft); transform: translateY(-4px) scale(1.05); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3); }

        .certifications-section { margin-top: 3rem; text-align: center; }
        .cert-title { font-family: 'Instrument Serif', serif; font-size: 1.5rem; margin-bottom: 1.5rem; background: var(--gradient-2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .cert-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem; }
        .cert-tag { padding: 0.75rem 1.25rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; font-size: 0.85rem; color: var(--text-secondary); transition: all 0.3s ease; }
        .cert-tag:hover { border-color: var(--accent-cyan); color: var(--text-primary); box-shadow: 0 0 25px var(--cyan-glow); }

        .contact-container { text-align: center; max-width: 800px; margin: 0 auto; }
        .contact-title { font-family: 'Instrument Serif', serif; font-size: clamp(3rem, 6vw, 5rem); font-weight: 400; margin-bottom: 1.5rem; }
        .contact-title .highlight { font-style: italic; background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .contact-description { color: var(--text-secondary); font-size: 1.15rem; margin-bottom: 3rem; }
        .contact-links { display: flex; justify-content: center; gap: 1.25rem; flex-wrap: wrap; }
        .contact-link { display: inline-flex; align-items: center; gap: 0.75rem; padding: 1.25rem 2rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; color: var(--text-primary); text-decoration: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); }
        .contact-link:hover { border-color: var(--accent); transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(139, 92, 246, 0.25); }
        .contact-link svg { width: 22px; height: 22px; transition: all 0.3s ease; }
        .contact-link:hover svg { transform: scale(1.2); filter: drop-shadow(0 0 10px var(--accent-glow)); }

        footer { padding: 4rem 3rem; text-align: center; border-top: 1px solid var(--border); background: rgba(5, 5, 7, 0.5); backdrop-filter: blur(10px); }
        footer p { color: var(--text-muted); font-size: 0.9rem; }
        footer p span { background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .reveal { opacity: 0; transform: translateY(60px); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .reveal-delay-1 { transition-delay: 0.1s; } .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; } .reveal-delay-4 { transition-delay: 0.4s; }

        @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            nav { padding: 1rem 1.5rem; }
            .nav-links { position: fixed; top: 70px; left: 0; right: 0; background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(20px); flex-direction: column; padding: 1.5rem; gap: 0.5rem; border-bottom: 1px solid var(--border); transform: translateY(-100%); opacity: 0; pointer-events: none; transition: all 0.3s ease; }
            .nav-links.active { transform: translateY(0); opacity: 1; pointer-events: all; }
            .nav-links a { text-align: center; padding: 1rem; }
            .menu-toggle { display: flex; }
            .hero, section { padding-left: 1.5rem; padding-right: 1.5rem; }
            .projects-grid, .education-grid { grid-template-columns: 1fr; }
            .experience-timeline { padding-left: 2rem; }
            .experience-card::before { left: -2rem; }
            .cursor, .cursor-dot { display: none; }
        }
    </style>
</body>
</html>
